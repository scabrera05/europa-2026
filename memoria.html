<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🃏 Memoria</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#7c3aed,#0ea5e9)}
body{display:flex;flex-direction:column}

.header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(0,0,0,.15)}
.back-btn{color:#fff;text-decoration:none;font-size:.95em;font-weight:700;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.2)}
.header h1{color:#fff;font-size:1.1em;font-weight:800;flex:1;text-align:center}
.header-spacer{width:56px}

.stats{display:flex;justify-content:center;gap:20px;padding:6px 0;color:#fff;font-size:.85em}
.stat{background:rgba(255,255,255,.15);padding:5px 14px;border-radius:10px;font-weight:700}

.board{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px 10px 8px;align-content:center}

.card{position:relative;cursor:pointer;aspect-ratio:1}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;border-radius:14px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;-webkit-backface-visibility:hidden;font-size:2em;border:2px solid rgba(255,255,255,.2)}
.card-front{background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.06));color:#fff;font-size:1.6em;transform:rotateY(0deg)}
.card-back{background:rgba(255,255,255,.92);transform:rotateY(180deg)}
.card.matched .card-back{background:rgba(200,255,200,.9);animation:matchpop .4s ease}
@keyframes matchpop{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.12)}100%{transform:rotateY(180deg) scale(1)}}

/* Win overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;animation:fadeIn .4s ease}
.overlay.hidden{display:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay h2{color:#fff;font-size:1.6em;font-weight:900;text-align:center}
.stars{font-size:2.2em;letter-spacing:4px}
.overlay p{color:rgba(255,255,255,.85);font-size:.95em;text-align:center}
.play-again{background:#fff;color:#7c3aed;border:none;font-size:1em;font-weight:800;padding:12px 28px;border-radius:16px;cursor:pointer;margin-top:4px}

/* Confetti */
.confetti-piece{position:fixed;width:9px;height:9px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>

<div class="header">
  <a href="juegos.html" class="back-btn">← Volver</a>
  <h1>🃏 Memoria</h1>
  <div class="header-spacer"></div>
</div>

<div class="stats">
  <div class="stat">Intentos: <span id="attempts">0</span></div>
  <div class="stat">⏱ <span id="timer">0:00</span></div>
</div>

<div class="board" id="board"></div>

<div class="overlay hidden" id="overlay">
  <div class="stars" id="stars"></div>
  <h2 id="win-msg">¡Lo lograste!</h2>
  <p id="win-stats"></p>
  <button class="play-again" onclick="initGame()">¡Jugar de nuevo!</button>
</div>

<script>
const EMOJIS=['🐄','🦅','🏔','🍕','🍦','🏰'];
let cards=[], flipped=[], matched=0, attempts=0, locked=false;
let timerInterval=null, seconds=0;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function fmt(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`}

function initGame(){
  clearInterval(timerInterval);
  flipped=[]; matched=0; attempts=0; locked=false; seconds=0;
  document.getElementById('attempts').textContent=0;
  document.getElementById('timer').textContent='0:00';
  document.getElementById('overlay').classList.add('hidden');

  const deck=shuffle([...EMOJIS,...EMOJIS]);
  const board=document.getElementById('board');
  board.innerHTML='';
  cards=deck.map((emoji,i)=>{
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=`<div class="card-inner"><div class="card-front">❓</div><div class="card-back">${emoji}</div></div>`;
    c.dataset.emoji=emoji;
    c.dataset.i=i;
    c.addEventListener('click',()=>flip(c));
    board.appendChild(c);
    return c;
  });

  timerInterval=setInterval(()=>{
    seconds++;
    document.getElementById('timer').textContent=fmt(seconds);
  },1000);
}

function flip(c){
  if(locked||c.classList.contains('flipped')||c.classList.contains('matched')) return;
  c.classList.add('flipped');
  flipped.push(c);
  if(flipped.length===2) check();
}

function check(){
  locked=true;
  attempts++;
  document.getElementById('attempts').textContent=attempts;
  const [a,b]=flipped;
  if(a.dataset.emoji===b.dataset.emoji){
    a.classList.add('matched'); b.classList.add('matched');
    a.classList.remove('flipped'); b.classList.remove('flipped');
    matched++;
    flipped=[];
    locked=false;
    if(matched===EMOJIS.length) setTimeout(showWin,400);
  } else {
    setTimeout(()=>{
      a.classList.remove('flipped'); b.classList.remove('flipped');
      flipped=[]; locked=false;
    },900);
  }
}

function showWin(){
  clearInterval(timerInterval);
  const stars=attempts<14?'⭐⭐⭐':attempts<20?'⭐⭐':'⭐';
  document.getElementById('stars').textContent=stars;
  document.getElementById('win-msg').textContent='¡Lo encontraste todo! 🎉';
  document.getElementById('win-stats').textContent=`Intentos: ${attempts} · Tiempo: ${fmt(seconds)}`;
  document.getElementById('overlay').classList.remove('hidden');
  confetti();
}

function confetti(){
  const colors=['#ffd700','#ff6b6b','#74c7ec','#a6e3a1','#f38ba8','#fab387','#cba6f7'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};animation-duration:${.8+Math.random()*1.4}s;animation-delay:${Math.random()*.5}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2500);
  }
}

initGame();
</script>
</body>
</html>
