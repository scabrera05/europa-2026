<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔢 ¿Cuántos hay?</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(160deg,#c2410c,#f59e0b)}
body{display:flex;flex-direction:column}

.header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(0,0,0,.15)}
.back-btn{color:#fff;text-decoration:none;font-size:.95em;font-weight:700;padding:6px 10px;border-radius:10px;background:rgba(255,255,255,.2)}
.header h1{color:#fff;font-size:1.1em;font-weight:800;flex:1;text-align:center}
.header-spacer{width:56px}

.progress{color:#fff;text-align:center;font-size:.85em;font-weight:700;padding:4px 0;opacity:.85}
.score-bar{color:#fff;text-align:center;font-size:1em;font-weight:900;padding:2px 0}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 12px;gap:10px}

.emoji-area{background:rgba(255,255,255,.12);border-radius:20px;width:100%;min-height:160px;max-height:220px;position:relative;overflow:hidden;flex-shrink:0}
.emoji-item{position:absolute;font-size:2em;user-select:none;line-height:1}

.question{color:#fff;font-size:1.1em;font-weight:800;text-align:center}

.choices{display:flex;gap:12px;justify-content:center}
.choice{background:rgba(255,255,255,.9);border:none;border-radius:18px;font-size:1.6em;font-weight:900;width:72px;height:72px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#c2410c;transition:transform .1s}
.choice:active{transform:scale(.92)}
.choice.correct{background:#4ade80;color:#166534;animation:pop .3s ease}
.choice.wrong{background:#f87171;color:#7f1d1d;animation:shake .3s ease}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.feedback{color:#fff;font-size:1.1em;font-weight:900;text-align:center;min-height:30px;text-shadow:0 2px 8px rgba(0,0,0,.25)}

/* End screen */
.end{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;display:none}
.end h2{color:#fff;font-size:1.7em;font-weight:900;text-align:center}
.end p{color:rgba(255,255,255,.9);font-size:1em;text-align:center}
.end-score{font-size:3em;font-weight:900;color:#fff;text-shadow:0 4px 16px rgba(0,0,0,.2)}
.btn-restart{background:#fff;color:#c2410c;border:none;font-size:1em;font-weight:800;padding:14px 30px;border-radius:18px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <a href="juegos.html" class="back-btn">← Volver</a>
  <h1>🔢 ¿Cuántos hay?</h1>
  <div class="header-spacer"></div>
</div>

<div id="game">
  <div class="progress" id="progress">Ronda 1 de 10</div>
  <div class="score-bar" id="score-bar">⭐ 0 puntos</div>

  <div class="stage">
    <div class="emoji-area" id="emoji-area"></div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<div class="end" id="end">
  <h2>¡Terminaste!</h2>
  <div class="end-score" id="end-score"></div>
  <p id="end-msg"></p>
  <button class="btn-restart" onclick="startGame()">¡Jugar de nuevo!</button>
</div>

<script>
const POOL=['🐄','🦅','🏔','🍕','🍦','🏰','🐐','🦢','🚐','🏎'];
let round=0, score=0;

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=rand(0,i);[r[i],r[j]]=[r[j],r[i]];}return r;}

function maxN(r){return r<=3?5:r<=7?7:10;}

function startGame(){
  round=0; score=0;
  document.getElementById('game').style.display='block';
  document.getElementById('end').style.display='none';
  nextRound();
}

function nextRound(){
  round++;
  if(round>10){showEnd();return;}
  document.getElementById('progress').textContent=`Ronda ${round} de 10`;
  document.getElementById('score-bar').textContent=`⭐ ${score} puntos`;
  document.getElementById('feedback').textContent='';

  const emoji=POOL[rand(0,POOL.length-1)];
  const n=rand(1,maxN(round));

  // Render emojis scattered
  const area=document.getElementById('emoji-area');
  area.innerHTML='';
  const W=area.offsetWidth||300, H=area.offsetHeight||160;
  const placed=[];
  for(let i=0;i<n;i++){
    let x,y,tries=0;
    do{x=rand(4,W-44);y=rand(4,H-44);tries++;}
    while(tries<30&&placed.some(p=>Math.abs(p[0]-x)<36&&Math.abs(p[1]-y)<36));
    placed.push([x,y]);
    const el=document.createElement('span');
    el.className='emoji-item';
    el.textContent=emoji;
    el.style.left=x+'px'; el.style.top=y+'px';
    area.appendChild(el);
  }

  document.getElementById('question').textContent=`¿Cuántos ${emoji} hay?`;

  // Distractors
  const opts=new Set([n]);
  while(opts.size<3){
    const d=Math.max(1,n+rand(-3,3));
    if(d!==n) opts.add(d);
  }
  const choices=shuffle([...opts]);
  const cont=document.getElementById('choices');
  cont.innerHTML='';
  choices.forEach(num=>{
    const btn=document.createElement('button');
    btn.className='choice';
    btn.textContent=num;
    btn.onclick=()=>pick(btn,num,n);
    cont.appendChild(btn);
  });
}

function pick(btn,chosen,correct){
  document.querySelectorAll('.choice').forEach(b=>b.onclick=null);
  if(chosen===correct){
    btn.classList.add('correct');
    score++;
    document.getElementById('feedback').textContent='✅ ¡Correcto! +1 punto';
  } else {
    btn.classList.add('wrong');
    document.getElementById('feedback').textContent=`❌ ¡Eran ${correct}!`;
    // Highlight correct
    document.querySelectorAll('.choice').forEach(b=>{if(+b.textContent===correct) b.classList.add('correct');});
  }
  setTimeout(nextRound,1200);
}

function showEnd(){
  document.getElementById('game').style.display='none';
  const end=document.getElementById('end');
  end.style.display='flex';
  document.getElementById('end-score').textContent=`${score}/10`;
  const msgs=['¡Seguí practicando! 💪','¡Muy bien! 👏','¡Excelente! 🌟','¡Perfecto! 🏆'];
  const idx=score<=4?0:score<=6?1:score<=9?2:3;
  document.getElementById('end-msg').textContent=msgs[idx];
}

startGame();
</script>
</body>
</html>
